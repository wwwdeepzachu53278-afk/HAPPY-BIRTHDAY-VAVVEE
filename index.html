<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Legend Birthday Surprise ❤️ Bhanu</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* 🔐 LOCK SCREEN */
#lock {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

input {
  padding: 10px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}

/* 🎬 MAIN */
#main {
  display: none;
  background: linear-gradient(to right, #ffdde1, #ee9ca7);
  height: 100vh;
  padding: 20px;
}

/* 💖 hearts */
.heart {
  position: fixed;
  color: #ff4d6d;
  animation: float 5s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* 🎉 confetti */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg); }
}

/* 📸 slideshow */
.slide {
  width: 250px;
  border-radius: 15px;
  margin-top: 10px;
  display: none;
}

/* ⌨️ typing */
#type {
  font-size: 20px;
  margin-top: 20px;
  min-height: 80px;
}
</style>
</head>

<body>

<!-- 🔐 LOCK -->
<div id="lock">
  <h1>🔐 Enter Password to Unlock Surprise</h1>
  <p>Hint: Her Name ❤️</p>

  <input id="pass" placeholder="Enter password">
  <button onclick="check()">Unlock 💖</button>
</div>

<!-- 🎬 MAIN -->
<div id="main">

<h1>🎂 Happy Birthday Bhanu ❤️</h1>

<!-- 📸 SLIDESHOW -->
<img class="slide" id="img1" src="1.jpg">
<img class="slide" id="img2" src="2.jpg">
<img class="slide" id="img3" src="3.jpg">

<!-- ⌨️ TYPING -->
<div id="type"></div>

<h2>💖 I Like You More Than Words Can Say 💖</h2>

</div>

<!-- 🔊 AUDIO -->
<audio id="click">
  <source src="click.mp3">
</audio>

<audio autoplay loop>
  <source src="aud.mp3">
</audio>

<script>

function check(){
  let p = document.getElementById("pass").value;

  if(p.toLowerCase() == "bhanu"){
    document.getElementById("lock").style.display = "none";
    document.getElementById("main").style.display = "block";

    startEffects();
    startTyping();
    startSlideshow();
  } else {
    alert("Wrong Password 😜 Try again");
  }
}

/* 💖 hearts */
function startEffects(){
  setInterval(() => {
    let h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML = "💖";
    h.style.left = Math.random()*100 + "vw";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
  }, 150);

  setInterval(() => {
    let c = document.createElement("div");
    c.classList.add("confetti");
    c.style.left = Math.random()*100 + "vw";
    c.style.background = ["red","yellow","blue","pink"][Math.floor(Math.random()*4)];
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }, 100);
}

/* ⌨️ typing animation */
let text = "Bhanu ❤️\nYou are the most special person in my life.\nEvery smile of yours means everything to me.\nI may not express it always, but I truly care about you ❤️\nHappy Birthday My Love 🎂💖";

let i = 0;
function startTyping(){
  let div = document.getElementById("type");

  let interval = setInterval(() => {
    div.innerHTML += text.charAt(i);
    i++;

    if(i >= text.length){
      clearInterval(interval);
    }
  }, 50);
}

/* 📸 slideshow */
function startSlideshow(){
  let imgs = ["img1","img2","img3"];
  let i = 0;

  setInterval(() => {
    imgs.forEach(id => document.getElementById(id).style.display = "none");

    let current = document.getElementById(imgs[i]);
    if(current) current.style.display = "block";

    i = (i+1) % imgs.length;
  }, 2000);
}

</script>

</body>
</html>
